<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./register.css">
</head>

<body>

<!-- TOP CONTROLS -->
<div class="top-controls">
  <button class="ctrl-btn" id="rtlToggle">≡</button>
  <button class="ctrl-btn" id="themeToggle">☀</button>
</div>

<section class="auth-page">

  <!-- TAB -->
  <div class="tab">SIGN UP</div>

  <div class="card">

    <!-- LOGO -->
    <div class="card-logo">
              <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="20" fill="var(--primary)"/>
          <path d="M20 8C20 8 28 18 28 24C28 28.4 24.4 32 20 32C15.6 32 12 28.4 12 24C12 18 20 8 20 8Z" fill="white" opacity="0.9"/>
          <circle cx="16" cy="23" r="3" fill="var(--secondary)" opacity="0.75"/>
        </svg>
                <span class="card-logo-text"><a href="/index.html">ResinLux</a></span>
            </div>

    <h2>Create Account</h2>
    <p class="sub">Sign up to get started</p>

    <form id="signupForm" novalidate>

      <!-- NAME -->
      <div class="form-group">
        <input type="text" id="name" placeholder="Full Name">
        <small class="error" id="nameError"></small>
      </div>

      <!-- EMAIL -->
      <div class="form-group">
        <input type="email" id="email" placeholder="Email Address">
        <small class="error" id="emailError"></small>
      </div>

      <!-- PASSWORD -->
      <div class="form-group password-group">
        <input type="password" id="password" placeholder="Password">
        <span class="eye" onclick="togglePassword('password')">👁</span>
        <small class="error" id="passwordError"></small>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="form-group password-group">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <span class="eye" onclick="togglePassword('confirmPassword')">👁</span>
        <small class="error" id="confirmError"></small>
      </div>

      <!-- TERMS -->
      <div class="terms">
        <label class="agree-label">
          <input type="checkbox"  id="terms"> I agree to Terms
        </label>
      </div>
      <small class="error" id="termsError"></small>

      <!-- BUTTON -->
      <button class="btn">SIGN UP</button>

      <!-- DIVIDER -->
      <div class="divider">or continue with</div>

      <!-- SOCIAL -->
      <div class="social">
        <button type="button" class="social-btn">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">
          Google
        </button>
        <button type="button" class="social-btn">
           <svg width="16" height="16" viewBox="0 0 814 1000"><path fill="currentColor" d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.1 133.4-316.5 264.4-316.5 69.4 0 127.3 45.5 170.8 45.5 41.3 0 106.1-48.3 183.6-48.3zm-194.3-86.4c31.4-37.4 54.3-89.2 54.3-140.9 0-7.1-.6-14.3-1.9-20.1-51.6 2-112.3 34.4-149.2 75.8-28.5 32.4-55.1 84.2-55.1 136.7 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 46.5 0 102.5-30.8 136.4-70.9z"/></svg>
          Apple
        </button>
      </div>

      <!-- SWITCH -->
      <p class="switch">
        Already have an account? <a href="login.html">Sign In</a>
      </p>

    </form>

  </div>

</section>

<script src="./register.js"></script>
</body>
</html>
